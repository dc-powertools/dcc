name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_call:
    inputs:
      ref:
        description: 'Git tag to build and release (e.g. v1.2.3)'
        required: true
        type: string

jobs:
  # Gate the build/release on green CI for the direct `push: tags` path. When
  # release.yml is called via workflow_call (from autotag.yml), CI already passed
  # before the tag was created, so re-running it would be redundant; inputs.ref is
  # empty only on a direct tag push.
  ci:
    name: CI
    if: ${{ inputs.ref == '' }}
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  build:
    name: Build ${{ matrix.target }}
    needs: ci
    # Proceed when CI passed (tag-push path) or was skipped (workflow_call path,
    # already gated by the caller); skip only when CI actually failed.
    if: ${{ !cancelled() && needs.ci.result != 'failure' }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref_name }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" == "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        run: tar -czf dcc-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release dcc

      - uses: actions/upload-artifact@v4
        with:
          name: dcc-${{ matrix.target }}
          path: dcc-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref_name }}

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.ref || github.ref_name }}
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
