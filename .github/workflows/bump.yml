name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump:
    name: Bump version
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.new }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Compute new version
        id: version
        run: |
          CURRENT=$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ inputs.bump_type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          echo "new=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Update Cargo.toml
        run: >
          sed -i
          "0,/^version = /s/^version = \"[^\"]*\"/version = \"${{ steps.version.outputs.new }}\"/"
          Cargo.toml

      - name: Update Cargo.lock
        run: cargo check

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore: bump version to v${{ steps.version.outputs.new }}"
          git push origin main
          git tag "v${{ steps.version.outputs.new }}"
          git push origin "v${{ steps.version.outputs.new }}"

  build:
    name: Build ${{ matrix.target }}
    needs: bump
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false

    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump.outputs.version }}"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == true
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        run: |
          if [ "${{ matrix.use_cross }}" == "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package
        run: tar -czf dcc-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release dcc

      - uses: actions/upload-artifact@v4
        with:
          name: dcc-${{ matrix.target }}
          path: dcc-${{ matrix.target }}.tar.gz

  release:
    name: Create Release
    needs: [bump, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: "v${{ needs.bump.outputs.version }}"

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ needs.bump.outputs.version }}"
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
